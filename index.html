<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Camera Embed</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" id="app" aria-live="polite">
      <video class="camera" id="video" autoplay muted playsinline></video>

      <img class="photo" id="resultImg" alt="Снимок" hidden />

      <button class="shutter" id="btnShot" type="button" aria-label="Сделать фото">
        <span class="shutterInner" aria-hidden="true"></span>
      </button>

      <div class="overlay" id="overlay" hidden>
        <div class="overlayText" id="overlayText">Запрашиваем доступ к камере…</div>
        <div class="overlayHint" id="overlayHint">Нужен HTTPS (или localhost).</div>
      </div>

      <canvas id="canvas" hidden></canvas>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
